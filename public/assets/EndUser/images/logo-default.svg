<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg" width="400" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#FF9500" stroke-width="8"/>
  
  <!-- Dark background inside -->
  <circle cx="100" cy="100" r="87" fill="#1a2332"/>
  
  <!-- Smiley face code bracket -->
  <g fill="none" stroke="white" stroke-width="6" stroke-linecap="round">
    <!-- Left bracket -->
    <path d="M 65 60 L 55 100 L 65 140"/>
    <!-- Right bracket -->
    <path d="M 135 60 L 145 100 L 135 140"/>
  </g>
  
  <!-- Smiley eyes -->
  <circle cx="75" cy="85" r="6" fill="white"/>
  <circle cx="125" cy="85" r="6" fill="white"/>
  
  <!-- Orange smiley mouth circle -->
  <circle cx="100" cy="120" r="18" fill="#FF9500"/>
  
  <!-- Mouth inside smile -->
  <path d="M 88 115 Q 100 125 112 115" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Right side text: KID CODER -->
  <g font-family="Arial, sans-serif" font-weight="bold" letter-spacing="2">
    <!-- KID -->
    <text x="180" y="90" font-size="48" fill="#FF9500" font-weight="bold">KID</text>
    <!-- CODER -->
    <text x="165" y="140" font-size="48" fill="white" font-weight="bold">CODER</text>
  </g>
  
  <!-- Bottom text: Academy -->
  <text x="180" y="165" font-size="24" font-family="Arial, sans-serif" fill="white" letter-spacing="3" font-style="italic">A c a d e m y</text>
  
  <!-- Bottom orange underline -->
  <line x1="165" y1="175" x2="390" y2="175" stroke="#FF9500" stroke-width="4" stroke-linecap="round"/>
</svg>